name: Build Plugin

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

# Least-privilege token so the build runs even on forks where the default
# GITHUB_TOKEN permissions are restricted. The build only needs to read the
# repo; artifact upload does not require any additional permissions.
permissions:
  contents: read

jobs:
  build:
    name: Build jar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build plugin jar
        run: ./gradlew build --refresh-dependencies

      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: BMTrails-plugin-jar
          path: build/libs/*.jar
          if-no-files-found: error
